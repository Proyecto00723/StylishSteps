<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | Stylish Steps</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5
        }
        
        .contenedor {
            max-width: 1100px;
            margin: auto;
            background: #fff;
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            gap: 30px
        }
        
        .galeria,
        .info {
            flex: 1;
            min-width: 300px
        }
        
        .galeria img {
            width: 100%;
            border-radius: 10px
        }
        
        .miniaturas {
            display: flex;
            gap: 10px;
            margin-top: 10px
        }
        
        .miniaturas img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent
        }
        
        .miniaturas img.active {
            border-color: #ff7a00
        }
        
        .precio {
            font-size: 28px;
            color: #ff7a00;
            font-weight: bold
        }
        
        .precio span {
            font-size: 16px;
            color: gray;
            text-decoration: line-through;
            margin-left: 10px
        }
        
        .bloque {
            margin-top: 20px
        }
        
        .tallas span,
        .colores span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 5px;
            cursor: pointer
        }
        
        .tallas span {
            padding: 10px 14px;
            border-radius: 6px;
            background: #eee
        }
        
        .tallas span.inactivo {
            background: #ccc;
            text-decoration: line-through;
            opacity: .5;
            cursor: not-allowed
        }
        
        .tallas span.activo {
            border: 2px solid #ff7a00
        }
        
        .colores span {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid #ccc
        }
        
        .colores span.activo {
            border: 3px solid #ff7a00
        }
        
        .boton {
            margin-top: 30px;
            width: 100%;
            padding: 15px;
            background: #ff7a00;
            color: #fff;
            border: none;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center
        }
        
        .modalContenido {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 10px
        }
        
        .stock-ok {
            color: green;
            font-weight: bold;
        }
        
        .stock-no {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="contenedor">

        <div class="galeria">
            <img id="imgPrincipal">
            <div class="miniaturas" id="miniaturas"></div>
        </div>

        <div class="info">

            <h1 id="nombre"></h1>

            <div class="precio" id="precio"></div>

            <div id="descripcion"></div>

            <div class="bloque">
                <p><strong>Stock disponible:</strong>
                    <span id="stock"></span>
                    <span id="estadoStock"></span>
                </p>

                <p><strong>ID:</strong>
                    <span id="idProductoMostrar"></span>
                </p>
            </div>

            <div class="bloque">
                <strong>Talla:</strong>
                <div class="tallas" id="tallas"></div>
            </div>

            <div class="bloque">
                <strong>Color:</strong>
                <div class="colores" id="colores"></div>
            </div>

            <button class="boton" id="btnComprar" disabled>Comprar</button>

        </div>
    </div>

    <div class="modal" id="ventanaCompra">
        <div class="modalContenido">

            <h3>Datos del Cliente</h3>

            <input id="nombreCliente" placeholder="Nombre completo">
            <input id="dniCliente" placeholder="DNI">
            <input id="ciudadCliente" placeholder="Ciudad">
            <input id="celularCliente" placeholder="Celular">
            <textarea id="notaCliente" placeholder="Notas"></textarea>

            <button id="confirmarPedido">Enviar por WhatsApp</button>

        </div>
    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"; import { getDatabase, ref, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"; const firebaseConfig = {
        apiKey:"AIzaSyCCDSr", authDomain:"stylishsteps-10fc4.firebaseapp.com", databaseURL:"https://stylishsteps-10fc4-default-rtdb.firebaseio.com", projectId:"stylishsteps-10fc4" }; const app = initializeApp(firebaseConfig); const db = getDatabase(app);
        const params = new URLSearchParams(window.location.search); const idProducto = Number(params.get("id")); let tallaSeleccionada = null; let colorSeleccionado = null; let productoActual = null; const q = query( ref(db,"productos"), orderByChild("idProducto"),
        equalTo(idProducto) ); const snap = await get(q); snap.forEach(s=>{ productoActual = s.val(); document.getElementById("nombre").innerText = productoActual.nombre; document.getElementById("descripcion").innerText = productoActual.descripcion; document.getElementById("stock").innerText
        = productoActual.stock || 0; document.getElementById("idProductoMostrar").innerText = productoActual.idProducto; const precioDiv = document.getElementById("precio"); precioDiv.innerHTML = productoActual.descuento > 0 ? `S/ ${productoActual.precioFinal}
        <span>S/ ${productoActual.precio}</span>` : `S/ ${productoActual.precio}`; const estado = document.getElementById("estadoStock"); if(productoActual.stock > 0){ estado.innerText=" (Disponible)"; estado.classList.add("stock-ok"); }else{ estado.innerText="(Agotado)";
        estado.classList.add("stock-no"); document.getElementById("btnComprar").disabled=true; } const imgPrincipal = document.getElementById("imgPrincipal"); const mini = document.getElementById("miniaturas"); productoActual.imagenes.forEach((img,i)=>{
        if(i==0) imgPrincipal.src=img; const im=document.createElement("img"); im.src=img; im.onclick=()=>{ imgPrincipal.src=img; }; mini.appendChild(im); }); const tallasDiv = document.getElementById("tallas"); productoActual.tallas.forEach(t=>{ const
        sp=document.createElement("span"); sp.innerText=t.nombre; if(!t.activo) sp.classList.add("inactivo"); sp.onclick=()=>{ if(!t.activo) return; document.querySelectorAll(".tallas span") .forEach(x=>x.classList.remove("activo")); sp.classList.add("activo");
        tallaSeleccionada=t.nombre; validar(); }; tallasDiv.appendChild(sp); }); const coloresDiv=document.getElementById("colores"); if(productoActual.colores && productoActual.colores.length>0){ productoActual.colores.forEach(c=>{ const sp=document.createElement("span");
        sp.style.background=c.nombre; sp.onclick=()=>{ document.querySelectorAll(".colores span") .forEach(x=>x.classList.remove("activo")); sp.classList.add("activo"); colorSeleccionado=c.nombre; validar(); }; coloresDiv.appendChild(sp); }); }else{ coloresDiv.innerHTML=
        "Sin colores disponibles"; colorSeleccionado="Sin color"; } }); function validar(){ const btn = document.getElementById("btnComprar"); if(productoActual.colores && productoActual.colores.length>0){ btn.disabled = !(tallaSeleccionada && colorSeleccionado);
        }else{ btn.disabled = !tallaSeleccionada; } } document.getElementById("btnComprar").onclick=()=>{ document.getElementById("ventanaCompra").style.display="flex"; }; document.getElementById("confirmarPedido").onclick=()=>{ const nombre=document.getElementById("nombreCliente").value;
        const dni=document.getElementById("dniCliente").value; const ciudad=document.getElementById("ciudadCliente").value; const celular=document.getElementById("celularCliente").value; const nota=document.getElementById("notaCliente").value; const precioFinal
        = productoActual.precioFinal || productoActual.precio; const fecha=new Date().toLocaleString("es-PE"); const mensaje=` Hola, quiero hacer un pedido. 👤 Datos del Cliente Nombre: ${nombre} DNI: ${dni} Ciudad: ${ciudad} Celular: ${celular} Notas:
        ${nota} 📦 Producto ${productoActual.nombre} ID: ${productoActual.idProducto} Talla: ${tallaSeleccionada} Color: ${colorSeleccionado} Precio: S/ ${precioFinal} TOTAL: S/ ${precioFinal} Fecha: ${fecha} `; const url=`https://wa.me/51925944615?text=${encodeURIComponent(mensaje)}`;
        window.open(url,"_blank"); };

    </script>

</body>

</html>
